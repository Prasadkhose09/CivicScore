services:

  # ─── MySQL Database ──────────────────────────
  mysql:
    image: mysql:8.0
    container_name: civicscore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Hello@512}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-civicscore}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - civicscore-network

  # ─── Spring Boot Backend ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicscore-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-civicscore}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Hello@512}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - civicscore-network

  # ─── React Frontend (Nginx) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civicscore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - civicscore-network

volumes:
  mysql_data:
    driver: local

networks:
  civicscore-network:
    driver: bridge
